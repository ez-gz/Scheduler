<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Scheduler — Projects</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#000; --surface:#0d0d0d; --card:#0f0f0f; --border:#1c1c1c; --border2:#262626;
  --text:#ebebeb; --text-2:#787878; --text-3:#3d3d3d; --accent:#30d158; --red:#ff453a; --yellow:#ffd60a; --blue:#0a84ff;
  --nav-h:52px; --r:6px; --font:'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; line-height:1.5; -webkit-text-size-adjust:100%; }
header {
  position:sticky; top:0; z-index:10; background:rgba(0,0,0,0.92);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border); padding:max(11px, env(safe-area-inset-top)) 16px 11px;
  display:flex; align-items:center; gap:12px;
}
header h1 { font-size:13px; font-weight:600; flex:1; }
.meta { color:var(--text-3); font-size:11px; }
main { max-width:900px; margin:0 auto; padding:12px 10px calc(var(--nav-h) + 42px + env(safe-area-inset-bottom)); }
.summary { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:10px; }
.stat { padding:10px 12px; border-right:1px solid var(--border); }
.stat:last-child { border-right:none; }
.stat-n { font-size:18px; font-weight:700; line-height:1; }
.stat-l { font-size:9px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
.list { display:flex; flex-direction:column; gap:6px; }
.project { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px; }
.project-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
.pname { font-size:13px; font-weight:650; flex:1; word-break:break-word; }
.pdir { color:var(--text-3); font-size:10px; margin-top:2px; word-break:break-word; }
.badge { color:var(--accent); border:1px solid rgba(48,209,88,0.25); border-radius:3px; padding:2px 6px; font-size:10px; flex-shrink:0; }
.bar { display:flex; height:6px; overflow:hidden; border-radius:3px; background:#090909; margin:8px 0; }
.seg.pending { background:var(--yellow); opacity:.55; }
.seg.running { background:var(--accent); }
.seg.done { background:#1f6f37; }
.seg.failed { background:var(--red); }
.seg.cancelled { background:var(--text-3); }
.counts { display:flex; flex-wrap:wrap; gap:8px; color:var(--text-2); font-size:10px; margin-bottom:8px; }
.counts span strong { color:var(--text); font-weight:600; }
.recent { border-top:1px solid var(--border); padding-top:7px; display:flex; flex-direction:column; gap:5px; }
.task { display:flex; gap:7px; align-items:flex-start; font-size:11px; color:var(--text-2); }
.dot { width:6px; height:6px; border-radius:50%; margin-top:5px; flex-shrink:0; background:var(--text-3); }
.dot.pending { background:var(--yellow); } .dot.running { background:var(--accent); } .dot.done { background:#245c33; } .dot.failed { background:var(--red); }
.task-title { flex:1; word-break:break-word; }
.runner { color:var(--text-3); font-size:10px; }
.empty { text-align:center; color:var(--text-3); padding:48px 0; }
.bnav {
  position:fixed; bottom:0; left:0; right:0; z-index:100; background:rgba(0,0,0,0.96);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border);
  display:grid; grid-template-columns:repeat(5,1fr); height:calc(var(--nav-h) + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom);
}
.nitem { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text-3); text-decoration:none; font-size:8px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; padding:8px 0; }
.nitem.active { color:var(--accent); }
.nicon svg { width:18px; height:18px; }
</style>
</head>
<body>
<header>
  <h1>Projects</h1>
  <span class="meta" id="updated">loading</span>
</header>
<main>
  <div class="summary">
    <div class="stat"><div class="stat-n" id="s-projects">-</div><div class="stat-l">projects</div></div>
    <div class="stat"><div class="stat-n" id="s-tasks">-</div><div class="stat-l">tasks</div></div>
    <div class="stat"><div class="stat-n" id="s-active">-</div><div class="stat-l">active</div></div>
  </div>
  <div class="list" id="projects"></div>
</main>

<nav class="bnav">
  <a href="/" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="17" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg></span><span>Queue</span></a>
  <a href="/projects.html" class="nitem active"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 5h6l2 2h8v12H4z"/><path d="M4 10h16"/></svg></span><span>Projects</span></a>
  <a href="/terminals.html" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m5 7 5 5-5 5"/><path d="M12 19h7"/></svg></span><span>Shell</span></a>
  <a href="/admin.html" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg></span><span>Admin</span></a>
  <a href="/settings.html" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg></span><span>Settings</span></a>
</nav>

<script>
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shortRunner(r) { return String(r ?? '—').replace(/^claude-/, '').replace(/^codex-gpt-5\.4-mini$/, 'codex-mini').replace(/^codex-gpt-5\.4$/, 'codex'); }
function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return `${s}s`; if (s < 3600) return `${Math.floor(s/60)}m`; if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
}
function seg(cls, count, total) {
  if (!count) return '';
  return `<div class="seg ${cls}" style="width:${Math.max(3, Math.round(count / Math.max(total, 1) * 100))}%"></div>`;
}
function projectCard(p) {
  const active = p.pending + p.running;
  const runner = Object.entries(p.runnerMix).sort((a,b) => b[1]-a[1])[0]?.[0] ?? '—';
  return `<section class="project">
    <div class="project-top">
      <div><div class="pname">${esc(p.name)}</div><div class="pdir">${esc(p.dir)}</div></div>
      ${active ? `<div class="badge">${active} active</div>` : ''}
    </div>
    <div class="bar">${seg('running',p.running,p.total)}${seg('pending',p.pending,p.total)}${seg('done',p.done,p.total)}${seg('failed',p.failed,p.total)}${seg('cancelled',p.cancelled,p.total)}</div>
    <div class="counts">
      <span><strong>${p.total}</strong> total</span><span><strong>${p.pending}</strong> pending</span><span><strong>${p.running}</strong> running</span>
      <span><strong>${p.done}</strong> done</span><span><strong>${p.failed}</strong> failed</span><span><strong>${p.worktrees}</strong> WT</span>
      ${p.durableWorktrees ? `<span><strong>${p.durableWorktrees}</strong> durable</span>` : ''}
      <span>${esc(shortRunner(runner))}</span><span>${timeAgo(p.lastActivity)} ago</span>
    </div>
    <div class="recent">${p.recent.map(t => `<div class="task"><span class="dot ${t.status}"></span><span class="task-title">${esc(t.title)}</span><span class="runner">${esc(shortRunner(t.runner))}</span></div>`).join('')}</div>
  </section>`;
}
async function load() {
  const res = await fetch('/api/projects/summary');
  const data = await res.json();
  document.getElementById('s-projects').textContent = data.totalProjects;
  document.getElementById('s-tasks').textContent = data.totalTasks;
  document.getElementById('s-active').textContent = data.projects.reduce((n,p) => n + p.pending + p.running, 0);
  document.getElementById('updated').textContent = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  document.getElementById('projects').innerHTML = data.projects.length ? data.projects.map(projectCard).join('') : '<div class="empty">no project activity yet</div>';
}
load(); setInterval(load, 8000);
</script>
</body>
</html>
