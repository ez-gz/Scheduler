<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Scheduler</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000;
  --surface: #0d0d0d;
  --card: #0f0f0f;
  --card-hover: #141414;
  --border: #1c1c1c;
  --border2: #262626;
  --text: #ebebeb;
  --text-2: #787878;
  --text-3: #3d3d3d;
  --accent: #30d158;
  --accent-dim: rgba(48,209,88,0.08);
  --red: #ff453a;
  --yellow: #ffd60a;
  --blue: #0a84ff;
  --nav-h: 52px;
  --r: 6px;
  --font: 'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
}
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 13px; line-height: 1.5;
  min-height: 100vh; -webkit-text-size-adjust: 100%; touch-action: manipulation;
}

/* ── Header ──────────────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: max(11px, env(safe-area-inset-top)) 16px 11px;
  display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; flex: 1; }
.wpill { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); }
.wdot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
.wdot.green { background: var(--accent); animation: blink 2s ease-in-out infinite; }
.wdot.yellow { background: var(--yellow); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.wact {
  background: none; border: none; color: var(--text-3); font-size: 11px;
  cursor: pointer; padding-left: 8px; margin-left: 2px; font-family: var(--font);
  border-left: 1px solid var(--border2); min-height: 26px;
  -webkit-tap-highlight-color: transparent; transition: color 0.12s;
}
.wact:hover, .wact:active { color: var(--text-2); }

/* ── Stats row ──────────────────────────────────────────────────────── */
.stats-row {
  display: grid; grid-template-columns: repeat(5, 1fr);
  border-bottom: 1px solid var(--border);
}
.stat {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px; border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }
.stat-n { font-size: 16px; font-weight: 600; line-height: 1; letter-spacing: -0.5px; }
.stat-n.hi-green { color: var(--accent); }
.stat-n.hi-red   { color: var(--red); }
.stat-l { font-size: 9px; color: var(--text-3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Tabs ───────────────────────────────────────────────────────────── */
.tabs {
  display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; border-bottom: 1px solid var(--border);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 9px 14px; font-size: 11px; font-weight: 500; letter-spacing: 0.2px;
  cursor: pointer; color: var(--text-2); white-space: nowrap; border: none;
  background: none; min-height: 38px; font-family: var(--font);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  -webkit-tap-highlight-color: transparent; transition: color 0.12s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ── Task list ──────────────────────────────────────────────────────── */
.task-list {
  padding: 6px 10px calc(var(--nav-h) + 96px + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; gap: 4px;
}
.empty { text-align: center; color: var(--text-3); font-size: 12px; padding: 48px 0; }

/* ── Task card ──────────────────────────────────────────────────────── */
.task-card {
  background: var(--card); border: 1px solid var(--border);
  border-left: 2px solid var(--border2);
  border-radius: var(--r); overflow: hidden; transition: border-color 0.12s;
}
.task-card.status-running { border-left-color: var(--accent); }
.task-card.status-done    { border-left-color: #1c3e26; }
.task-card.status-failed  { border-left-color: var(--red); }
.task-card.status-pending { border-left-color: var(--border2); }
.task-card.expanded { border-color: var(--border2); }
.task-card:hover { border-color: var(--border2); }
.task-card-header {
  padding: 10px 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.task-card-header:active { background: var(--card-hover); }
.task-row { display: flex; align-items: flex-start; gap: 7px; }
.sdot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
}
.sdot.running   { background: var(--accent); animation: blink 1.5s ease-in-out infinite; }
.sdot.done      { background: #2a5c38; }
.sdot.failed    { background: var(--red); }
.sdot.pending   { background: var(--border2); }
.sdot.cancelled { background: var(--text-3); }
.task-title { flex: 1; font-size: 13px; line-height: 1.45; word-break: break-word; }
.task-acts { display: flex; align-items: center; gap: 2px; flex-shrink: 0; margin-top: -2px; }
.xbtn {
  background: none; border: none; color: var(--text-3); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 4px 6px; margin: -4px -2px;
  font-family: var(--font); -webkit-tap-highlight-color: transparent;
  transition: color 0.12s;
}
.xbtn:hover, .xbtn:active { color: var(--red); }
.earrow {
  color: var(--text-3); font-size: 10px; transition: transform 0.18s;
  padding: 4px 5px; margin: -4px -3px;
}
.task-card.expanded .earrow { transform: rotate(180deg); }
.task-meta {
  font-size: 11px; color: var(--text-2); margin-top: 5px; padding-left: 13px;
}
.m-accent { color: var(--accent); }
.m-red    { color: var(--red); }
.m-muted  { color: var(--text-3); }
.m-sep    { color: var(--text-3); }
.sumbtn {
  background: none; border: none; color: var(--accent); font-size: 12px;
  cursor: pointer; padding: 4px 5px; margin: -4px -1px;
  opacity: 0.65; transition: opacity 0.12s; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.sumbtn:hover, .sumbtn:active { opacity: 1; }

/* ── Session actions ─────────────────────────────────────────────────── */
.sess-acts {
  display: flex; gap: 6px; padding: 8px 12px 10px;
  border-top: 1px solid var(--border);
}
.rbtn {
  padding: 5px 11px; font-size: 11px; font-weight: 500; border-radius: 4px;
  border: 1px solid var(--border2); background: transparent; color: var(--text-2);
  cursor: pointer; font-family: var(--font); min-height: 32px;
  -webkit-tap-highlight-color: transparent; transition: color 0.12s, border-color 0.12s;
}
.rbtn:hover, .rbtn:active { color: var(--accent); border-color: rgba(48,209,88,0.4); }

/* ── Task output ─────────────────────────────────────────────────────── */
.task-output { border-top: 1px solid var(--border); background: var(--bg); display: none; }
.task-card.expanded .task-output { display: block; }
.out-hdr {
  padding: 6px 12px; font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.task-output pre {
  padding: 12px; font-size: 11px; font-family: var(--font);
  line-height: 1.55; color: #5a5a5a; overflow-x: auto; white-space: pre-wrap;
  word-break: break-word; max-height: 440px; overflow-y: auto;
  overscroll-behavior: contain;
}
.out-loading { padding: 12px; color: var(--text-3); font-size: 11px; }
.out-meta {
  padding: 6px 12px; border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text-3); display: flex; gap: 10px; flex-wrap: wrap;
}

/* ── JSONL renderer ──────────────────────────────────────────────────── */
.jl-wrap {
  padding: 10px 12px; max-height: 460px; overflow-y: auto;
  overscroll-behavior: contain;
}
.jl-msg {
  font-size: 12px; line-height: 1.65; color: var(--text);
  padding: 7px 0; border-bottom: 1px solid var(--border);
  white-space: pre-wrap; word-break: break-word;
}
.jl-msg:last-child { border-bottom: none; }
.jl-msg code {
  font-family: var(--font); font-size: 11px; background: #111;
  border: 1px solid var(--border2); border-radius: 3px;
  padding: 1px 5px; color: var(--accent);
}
.jl-msg strong { color: var(--text); font-weight: 600; }
.jl-tool {
  font-size: 11px; border: 1px solid var(--border); border-radius: 4px;
  overflow: hidden; margin: 3px 0;
}
.jl-tool summary {
  list-style: none; padding: 5px 9px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; background: var(--surface);
  min-height: 30px; -webkit-tap-highlight-color: transparent;
}
.jl-tool summary::-webkit-details-marker { display: none; }
.jl-tool-name { color: var(--text-2); flex: 1; font-size: 11px; }
.jl-tool-arrow { color: var(--text-3); font-size: 9px; transition: transform 0.18s; }
.jl-tool[open] .jl-tool-arrow { transform: rotate(180deg); }
.jl-tool-body {
  border-top: 1px solid var(--border); padding: 7px 9px;
  font-size: 10.5px; color: #4a4a4a; font-family: var(--font);
  white-space: pre-wrap; word-break: break-word;
  max-height: 180px; overflow-y: auto; overscroll-behavior: contain;
}
.jl-usage {
  font-size: 10px; color: var(--text-3); padding: 6px 0 2px;
  text-align: right; border-top: 1px solid var(--border); margin-top: 3px;
}
.jl-raw { font-size: 10px; color: var(--text-3); opacity: 0.35; padding: 1px 0; }
.jl-live-hdr {
  padding: 5px 12px; font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}

/* ── FAB ─────────────────────────────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
  right: 18px; z-index: 200;
  width: 48px; height: 48px; border-radius: 24px;
  background: var(--accent); border: none;
  color: #000; font-size: 26px; font-weight: 300; font-family: var(--font);
  cursor: pointer; box-shadow: 0 4px 20px rgba(48,209,88,0.3);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.12s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(48,209,88,0.4); }
.fab:active { transform: scale(0.91); }

/* ── Modal ───────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-top: 1px solid var(--border2);
  border-radius: 10px 10px 0 0; width: 100%; max-width: 640px;
  padding: 16px 16px calc(28px + env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
}
.modal-handle { width: 28px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 14px; }
.modal h2 { font-size: 12px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); }
.form-label { display: block; font-size: 10px; color: var(--text-3); margin-bottom: 3px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.4px; font-family: var(--font); }
.form-label:first-of-type { margin-top: 0; }
textarea, input[type=text], input[type=number], select {
  width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); font-size: 13px; padding: 8px 10px; outline: none;
  font-family: var(--font); appearance: none; -webkit-appearance: none;
  transition: border-color 0.12s;
}
textarea:focus, input:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; }
.row2 { display: flex; gap: 8px; }
.row2 > * { flex: 1; }
.toggle-row {
  display: flex; align-items: center; gap: 10px; margin-top: 10px;
  padding: 8px 10px; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
}
.toggle-row span { flex: 1; font-size: 12px; color: var(--text-2); }
.toggle { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: var(--border2); border-radius: 11px; cursor: pointer; transition: background 0.18s; }
.slider:before { content: ''; position: absolute; height: 15px; width: 15px; left: 3px; bottom: 3px; background: #888; border-radius: 50%; transition: transform 0.18s, background 0.18s; }
input:checked + .slider { background: var(--accent); }
input:checked + .slider:before { transform: translateX(17px); background: #000; }
.hint { font-size: 11px; color: var(--text-3); margin-top: 3px; }
.resume-banner {
  background: var(--accent-dim); border: 1px solid rgba(48,209,88,0.18);
  border-radius: 4px; padding: 7px 9px; margin-bottom: 10px;
  font-size: 11px; color: var(--accent);
}
.btn-primary {
  width: 100%; margin-top: 14px; padding: 11px; border: none; border-radius: 5px;
  background: var(--accent); color: #000; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3px; text-transform: uppercase;
  cursor: pointer; min-height: 42px; font-family: var(--font);
  -webkit-tap-highlight-color: transparent; transition: opacity 0.12s;
}
.btn-primary:disabled { opacity: 0.35; }
.btn-primary:active:not(:disabled) { opacity: 0.78; }

/* ── Toast ───────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 76px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border2);
  padding: 7px 14px; border-radius: 14px;
  font-size: 11px; font-family: var(--font);
  opacity: 0; transition: opacity 0.16s; pointer-events: none;
  white-space: nowrap; z-index: 400;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
#toast.show { opacity: 1; }

/* ── Summary overlay ─────────────────────────────────────────────────── */
.sum-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 500;
  display: none; align-items: center; justify-content: center;
  padding: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.sum-overlay.open { display: flex; }
.sum-card {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
  width: 100%; max-width: 680px; max-height: 90vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(48,209,88,0.06);
}
.sum-hdr {
  padding: 12px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sum-prompt { font-size: 11px; color: var(--text-2); line-height: 1.4; margin-bottom: 8px; }
.sum-meta-row { display: flex; align-items: center; gap: 7px; }
.sum-runner { font-size: 10px; color: var(--text-3); padding: 2px 5px; border: 1px solid var(--border2); border-radius: 3px; }
.sum-timing { font-size: 10px; color: var(--text-3); flex: 1; }
.sum-copy {
  padding: 4px 9px; font-size: 10px; border-radius: 3px; border: 1px solid var(--border2);
  background: transparent; color: var(--text-3); cursor: pointer; font-family: var(--font);
  min-height: 26px; transition: color 0.12s;
}
.sum-copy:hover { color: var(--text-2); }
.sum-close {
  background: none; border: none; color: var(--text-3); font-size: 16px;
  cursor: pointer; padding: 3px 6px; line-height: 1;
  min-width: 28px; min-height: 28px; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: color 0.12s;
}
.sum-close:hover, .sum-close:active { color: var(--text); }
.sum-body { flex: 1; overflow-y: auto; padding: 16px; overscroll-behavior: contain; }
.sum-msg { font-size: 12px; line-height: 1.72; color: #aaa; white-space: pre-wrap; word-break: break-word; font-family: var(--font); }
.sum-msg strong { color: var(--text); font-weight: 600; }
.sum-msg .sh1 { display: block; font-size: 13px; color: var(--accent); margin: 14px 0 5px; font-weight: 600; }
.sum-msg .sh2 { display: block; font-size: 12px; color: var(--accent); margin: 11px 0 4px; font-weight: 600; }
.sum-msg .sh3 { display: block; font-size: 12px; color: #4a9e62; margin: 9px 0 4px; font-weight: 600; }
.sum-msg code { font-family: var(--font); font-size: 11px; background: #111; border: 1px solid var(--border2); border-radius: 3px; padding: 1px 5px; color: var(--accent); }
.sum-msg pre { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; overflow-x: auto; margin: 9px 0; white-space: pre; }
.sum-msg pre code { background: none; border: none; padding: 0; color: #606060; }
.sum-empty { color: var(--text-3); font-size: 11px; text-align: center; padding: 28px 0; }

/* ── Bottom nav ──────────────────────────────────────────────────────── */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(0,0,0,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(5, 1fr);
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
}
.nitem {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; color: var(--text-3); text-decoration: none;
  font-size: 8px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
  padding: 8px 0; font-family: var(--font);
  -webkit-tap-highlight-color: transparent; transition: color 0.12s;
}
.nitem.active { color: var(--accent); }
.nitem:active { opacity: 0.6; }
.nicon { display: flex; align-items: center; justify-content: center; }
.nicon svg { width: 18px; height: 18px; }
</style>
</head>
<body>

<header>
  <h1>Scheduler</h1>
  <div class="wpill" id="wpill">
    <div class="wdot" id="wdot"></div>
    <span id="wlbl">…</span>
    <button class="wact" id="wact" onclick="toggleWorker()" style="display:none"></button>
  </div>
</header>

<div class="stats-row">
  <div class="stat"><span class="stat-n" id="s-pending">-</span><span class="stat-l">pending</span></div>
  <div class="stat"><span class="stat-n" id="s-running">-</span><span class="stat-l">running</span></div>
  <div class="stat"><span class="stat-n" id="s-done">-</span><span class="stat-l">done</span></div>
  <div class="stat"><span class="stat-n" id="s-today">-</span><span class="stat-l">today</span></div>
  <div class="stat"><span class="stat-n" id="s-failed">-</span><span class="stat-l">failed</span></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-filter="all">all</button>
  <button class="tab" data-filter="pending">pending</button>
  <button class="tab" data-filter="running">running</button>
  <button class="tab" data-filter="done">done</button>
  <button class="tab" data-filter="failed">failed</button>
</div>

<div class="task-list" id="task-list"></div>

<button class="fab" onclick="openModal()" title="New task">+</button>

<!-- New task modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">new task</h2>

    <div id="resume-banner" class="resume-banner" style="display:none"></div>

    <div class="form-label">task</div>
    <textarea id="f-task" placeholder="describe what the agent should do…" rows="4"></textarea>

    <div class="form-label">directory</div>
    <input list="dir-list" id="f-dir" type="text" placeholder="~/projects/…" autocomplete="off">
    <datalist id="dir-list"></datalist>

    <div class="row2" style="margin-top:10px">
      <div>
        <div class="form-label">runner</div>
        <select id="f-runner"></select>
      </div>
      <div>
        <div class="form-label">priority</div>
        <input type="number" id="f-priority" value="0" min="0" max="100">
      </div>
    </div>

    <div class="toggle-row" id="worktree-row">
      <span>worktree + open PR</span>
      <label class="toggle">
        <input type="checkbox" id="f-worktree">
        <span class="slider"></span>
      </label>
    </div>
    <div class="hint" id="worktree-hint">isolated branch · commits · push · PR</div>

    <div class="toggle-row" id="durable-row" style="display:none">
      <span>keep worktree</span>
      <label class="toggle">
        <input type="checkbox" id="f-durable-worktree">
        <span class="slider"></span>
      </label>
    </div>
    <div class="hint" id="durable-hint" style="display:none">leave the worktree on disk for inspection, cleanup, or continuation</div>

    <button class="btn-primary" id="submit-btn" onclick="submitTask()">add to queue</button>
  </div>
</div>

<!-- Summary overlay -->
<div class="sum-overlay" id="sum-overlay" onclick="closeSumOverlay(event)">
  <div class="sum-card">
    <div class="sum-hdr">
      <div class="sum-prompt" id="sum-prompt"></div>
      <div class="sum-meta-row">

<script>
let activeFilter = 'all';
let allTasks = [];
let expandedIds = new Set();
let outputCache = {};
let activeSources = {};
let dirs = [];
let workerPaused = false;
let prevTasksKey = '';
let tailLines = {};
let appConfig = {};

// ── Helpers ────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
}
function shortRunner(r) {
  if (!r) return '—';
  return r
    .replace(/^claude-/, '')
    .replace(/^codex-gpt-5\.4-mini$/, 'codex-mini')
    .replace(/^codex-gpt-5\.4$/, 'codex');
}
function renderInlineMarkdown(raw) {
  return esc(raw)
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
}

function renderJsonlLine(line) {
  if (!line.trim() || !line.startsWith('{')) return '';
  let ev;
  try { ev = JSON.parse(line); } catch { return `<div class="jl-raw">${esc(line)}</div>`; }

  if (ev.type === 'assistant' && ev.message?.content) {
    return ev.message.content.map(block => {
      if (block.type === 'text') {
        if (!block.text?.trim()) return '';
        return `<div class="jl-msg">${renderInlineMarkdown(block.text)}</div>`;
      }
      if (block.type === 'tool_use') {
        const args = JSON.stringify(block.input, null, 2);
        return `<details class="jl-tool"><summary><span class="jl-tool-name">${esc(block.name)}</span><span class="jl-tool-arrow">▾</span></summary><div class="jl-tool-body">${esc(args)}</div></details>`;
      }
      return '';
    }).join('');
  }

  if (ev.type === 'result' && ev.usage) {
    const tok = ev.usage;
    return `<div class="jl-usage">${(tok.input_tokens||0).toLocaleString()} in · ${(tok.output_tokens||0).toLocaleString()} out</div>`;
  }

  // Codex item events
  if (ev.type === 'item.started') return '';
  if (ev.type === 'item.completed' && ev.item) {
    const item = ev.item;
    if (item.type === 'agent_message' && item.text?.trim()) {
      return `<div class="jl-msg">${renderInlineMarkdown(item.text)}</div>`;
    }
    if (item.type === 'command_execution') {
      const cmd = esc(item.command || '?');
      const out = (item.aggregated_output || '').trim();
      return `<details class="jl-tool"><summary><span class="jl-tool-name">${cmd}</span><span class="jl-tool-arrow">▾</span></summary><div class="jl-tool-body">${out ? esc(out) : '(no output)'}</div></details>`;
    }
    if (item.type === 'file_change') {
      const changes = Array.isArray(item.changes) ? item.changes : [];
      const summary = changes.map(c => esc(`${(c.kind ?? '~').padEnd(6)} ${c.path ?? ''}`)).join('\n') || '(no changes)';
      return `<details class="jl-tool"><summary><span class="jl-tool-name">file changes · ${changes.length}</span><span class="jl-tool-arrow">▾</span></summary><div class="jl-tool-body">${summary}</div></details>`;
    }
    return '';
  }

  if (ev.type === 'turn.completed' && ev.usage) {
    const tok = ev.usage;
    return `<div class="jl-usage">${(tok.input_tokens||0).toLocaleString()} in · ${(tok.output_tokens||0).toLocaleString()} out</div>`;
  }

  return '';
}

function renderJsonl(rawOutput, runner) {
  if (!rawOutput) return '<div class="out-loading">no output</div>';
  const parts = rawOutput.split('\n').map(renderJsonlLine).filter(Boolean);
  if (!parts.length) {
    return `<pre style="font-size:11px;font-family:var(--font);line-height:1.55;color:#5a5a5a;white-space:pre-wrap;word-break:break-word;max-height:440px;overflow-y:auto;overscroll-behavior:contain">${esc(rawOutput.slice(-8000))}</pre>`;
  }
  return parts.join('');
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── Data ───────────────────────────────────────────────────────────────
async function loadAll() {
  const [qRes, sRes, wRes] = await Promise.all([
    fetch('/api/queue'), fetch('/api/queue/stats'), fetch('/api/status'),
  ]);
  allTasks = await qRes.json();
  const stats = await sRes.json();
  const ws = await wRes.json();

  const rn = document.getElementById('s-running');
  const fl = document.getElementById('s-failed');
  document.getElementById('s-pending').textContent = stats.pending;
  rn.textContent = stats.running;
  rn.className = 'stat-n' + (stats.running > 0 ? ' hi-green' : '');
  document.getElementById('s-done').textContent = stats.done;
  document.getElementById('s-today').textContent = stats.doneToday;
  fl.textContent = stats.failed;
  fl.className = 'stat-n' + (stats.failed > 0 ? ' hi-red' : '');

  workerPaused = ws.paused;
  const dot = document.getElementById('wdot');
  const lbl = document.getElementById('wlbl');
  const act = document.getElementById('wact');
  if (ws.paused) {
    dot.className = 'wdot yellow'; lbl.textContent = 'paused';
    act.textContent = 'resume'; act.style.display = '';
  } else if (ws.running) {
    dot.className = 'wdot green'; lbl.textContent = 'running';
    act.style.display = 'none';
  } else {
    dot.className = 'wdot green'; lbl.textContent = 'idle';
    act.textContent = 'pause'; act.style.display = '';
  }

  updateTabCounts();
  renderTasks();
}

async function loadDirs() {
  const res = await fetch('/api/dirs');
  dirs = await res.json();
  const dl = document.getElementById('dir-list');
  dl.innerHTML = dirs.map(d => `<option value="${d}">`).join('');
}

async function loadConfig() {
  const res = await fetch('/api/config');
  appConfig = await res.json();
}

// ── Render ─────────────────────────────────────────────────────────────
function updateTabCounts() {
  const counts = { all: allTasks.length, pending: 0, running: 0, done: 0, failed: 0 };
  allTasks.forEach(t => { if (t.status in counts) counts[t.status]++; });
  const labels = { all: 'all', pending: 'pending', running: 'running', done: 'done', failed: 'failed' };
  document.querySelectorAll('.tab').forEach(tab => {
    const f = tab.dataset.filter;
    const n = counts[f] ?? 0;
    tab.textContent = n > 0 ? `${labels[f]} ${n}` : labels[f];
  });
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const tasks = activeFilter === 'all' ? allTasks : allTasks.filter(t => t.status === activeFilter);

  const key = activeFilter + '|' + tasks.map(t =>
    `${t.id}:${t.status}:${t.finalMessage?1:0}:${t.error?1:0}:${t.priority}`
  ).join(',');
  if (key === prevTasksKey) return;
  prevTasksKey = key;

  const scrollY = window.scrollY;

  if (!tasks.length) {
    list.innerHTML = `<div class="empty">no ${activeFilter === 'all' ? '' : activeFilter + ' '}tasks</div>`;
    requestAnimationFrame(() => window.scrollTo(0, scrollY));
    return;
  }

  const pendingOrdered = [...allTasks]
    .filter(t => t.status === 'pending')
    .sort((a, b) => b.priority - a.priority || new Date(a.created) - new Date(b.created));
  const posMap = new Map(pendingOrdered.map((t, i) => [t.id, i + 1]));

  list.innerHTML = tasks.map(t => taskCard(t, t.status === 'pending' ? posMap.get(t.id) : null)).join('');

  expandedIds.forEach(id => {
    const card = document.getElementById(`card-${id}`);
    if (card) {
      card.classList.add('expanded');
      const outEl = card.querySelector('.task-output');
      if (outEl && outputCache[id]) outEl.innerHTML = renderOutput(outputCache[id]);
    }
  });

  requestAnimationFrame(() => window.scrollTo(0, scrollY));
}

function metaLine(t, queuePos) {
  const dirShort = t.dir.split('/').slice(-2).join('/');
  const ago = timeAgo(t.created);
  const dur = t.started && t.completed
    ? `${Math.round((new Date(t.completed) - new Date(t.started)) / 1000)}s`
    : null;

  const parts = [];
  if (queuePos != null) parts.push(`<span class="m-accent">#${queuePos}</span>`);
  parts.push(`~/${esc(dirShort)}`);
  parts.push(esc(shortRunner(t.runner)));
  if (t.worktree) parts.push('WT');
  if (t.durableWorktree || t.worktreeMeta?.kept) parts.push('durable');
  if (t.priority > 0) parts.push(`p${t.priority}`);

  const sc = t.status === 'running' ? 'm-accent' : t.status === 'failed' ? 'm-red' : t.status === 'pending' ? 'm-muted' : '';
  parts.push(sc ? `<span class="${sc}">${t.status}</span>` : t.status);

  if (ago) parts.push(ago);
  if (dur) parts.push(dur);
  if (t.error) parts.push(`<span class="m-red">${esc(t.error.slice(0, 50))}</span>`);

  return parts.join('<span class="m-sep"> · </span>');
}

function taskCard(t, queuePos) {
  const isExp = t.status === 'done' || t.status === 'failed' || t.status === 'running' || t.output || t.error;
  const canResume = t.status === 'done' && !t.worktree && t.sessionId;
  const canBranch = canResume && t.runner?.startsWith('claude');

  return `
    <div class="task-card status-${t.status}" id="card-${t.id}">
      <div class="task-card-header" onclick="toggleExpand('${t.id}',${isExp})">
        <div class="task-row">
          <span class="sdot ${t.status}"></span>
          <span class="task-title">${esc(t.task)}</span>
          <div class="task-acts">
            ${t.finalMessage ? `<button class="sumbtn" onclick="openSum(event,'${t.id}')" title="summary">✦</button>` : ''}
            ${t.status === 'pending' ? `<button class="xbtn" onclick="cancelTask(event,'${t.id}')" title="remove">×</button>` : ''}
            ${t.status === 'running' ? `<button class="xbtn" style="color:var(--yellow)" onclick="forceFailTask(event,'${t.id}')" title="force fail">⚠</button>` : ''}
            ${isExp ? `<span class="earrow">▾</span>` : ''}
          </div>
        </div>
        <div class="task-meta">${metaLine(t, queuePos)}</div>
      </div>
      ${isExp ? `<div class="task-output" id="out-${t.id}"><div class="out-loading">loading…</div></div>` : ''}
      ${canResume ? `
      <div class="sess-acts">
        <button class="rbtn" onclick="continueTask(event,'${t.id}')">↩ continue</button>
        ${canBranch ? `<button class="rbtn" onclick="branchTask(event,'${t.id}')">⑂ branch</button>` : ''}
      </div>` : ''}
    </div>`;
}

function renderOutput(task) {
  const meta = [
    task.started   ? `started ${timeAgo(task.started)} ago` : null,
    task.completed ? `done ${timeAgo(task.completed)} ago`  : null,
    task.dir,
    task.worktreeMeta?.path ? `worktree ${task.worktreeMeta.path}` : null,
  ].filter(Boolean);
  let content;
  if (task.output) {
    content = `<div class="jl-wrap">${renderJsonl(task.output, task.runner)}</div>`;
  } else if (task.error) {
    content = `<div class="jl-wrap"><pre style="font-size:11px;font-family:var(--font);line-height:1.55;color:var(--red);white-space:pre-wrap;word-break:break-word;max-height:440px;overflow-y:auto">${esc(task.error)}</pre></div>`;
  } else {
    content = '<div class="out-loading">no output</div>';
  }
  return `
    <div class="out-hdr">output</div>
    ${content}
    <div class="out-meta">${meta.map(m => `<span>${esc(m)}</span>`).join(' · ')}</div>`;
}

// ── Interactions ───────────────────────────────────────────────────────
async function toggleExpand(id, expandable) {
  if (!expandable) return;
  const card = document.getElementById(`card-${id}`);
  const outEl = document.getElementById(`out-${id}`);
  if (!card || !outEl) return;

  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    expandedIds.delete(id);
    if (activeSources[id]) { activeSources[id].close(); delete activeSources[id]; }
    delete tailLines[id];
    return;
  }

  card.classList.add('expanded');
  expandedIds.add(id);

  const task = allTasks.find(t => t.id === id);
  if (task?.status === 'running') {
    tailLines[id] = [];
    outEl.innerHTML = `
      <div class="jl-live-hdr"><span class="wdot green"></span>live</div>
      <div class="jl-wrap" id="jl-${id}" style="min-height:48px"></div>`;
    const src = new EventSource(`/api/tasks/${id}/tail`);
    activeSources[id] = src;
    let rPending = false;
    src.onmessage = e => {
      tailLines[id].push(e.data);
      if (!rPending) {
        rPending = true;
        requestAnimationFrame(() => {
          const el = document.getElementById(`jl-${id}`);
          if (!el) { rPending = false; return; }
          const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
          el.innerHTML = renderJsonl(tailLines[id].join('\n'), task.runner);
          if (atBottom) el.scrollTop = el.scrollHeight;
          rPending = false;
        });
      }
    };
    src.onerror = () => {
      const el = document.getElementById(`jl-${id}`);
      if (el) el.innerHTML += '<div class="jl-raw" style="opacity:1;color:var(--text-3)">[stream ended]</div>';
    };
  } else {
    if (!outputCache[id]) {
      const res = await fetch(`/api/tasks/${id}`);
      outputCache[id] = await res.json();
    }
    outEl.innerHTML = renderOutput(outputCache[id]);
  }
}

async function forceFailTask(e, id) {
  e.stopPropagation();
  if (!confirm('Force-fail this task and reset the worker?')) return;
  await Promise.all([
    fetch(`/api/tasks/${id}/status`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'failed',error:'manually force-failed'}) }),
    fetch('/api/worker/reset', { method:'POST' }),
  ]);
  if (activeSources[id]) { activeSources[id].close(); delete activeSources[id]; }
  toast('force-failed');
  prevTasksKey = ''; loadAll();
}

async function cancelTask(e, id) {
  e.stopPropagation();
  await fetch(`/api/tasks/${id}`, { method:'DELETE' });
  toast('removed');
  prevTasksKey = ''; loadAll();
}

async function continueTask(e, id) {
  e.stopPropagation();
  if (!outputCache[id]) { const r = await fetch(`/api/tasks/${id}`); outputCache[id] = await r.json(); }
  const t = outputCache[id];
  openModal({ sessionId:t.sessionId, runner:t.runner, dir:t.dir, forkSession:false, sourceId:id });
}

async function branchTask(e, id) {
  e.stopPropagation();
  if (!outputCache[id]) { const r = await fetch(`/api/tasks/${id}`); outputCache[id] = await r.json(); }
  const t = outputCache[id];
  openModal({ sessionId:t.sessionId, runner:t.runner, dir:t.dir, forkSession:true, sourceId:id });
}

async function toggleWorker() {
  await fetch(workerPaused ? '/api/worker/resume' : '/api/worker/pause', {method:'POST'});
  loadAll();
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter = tab.dataset.filter;
  prevTasksKey = ''; renderTasks();
});

// ── Modal ──────────────────────────────────────────────────────────────
const RUNNERS = [
  { value:'claude-sonnet',      family:'claude' },
  { value:'claude-haiku',       family:'claude' },
  { value:'claude-opus',        family:'claude' },
  { value:'codex-gpt-5.4',      family:'codex'  },
  { value:'codex-gpt-5.4-mini', family:'codex'  },
];

function setRunnerOptions(family = null) {
  const el = document.getElementById('f-runner');
  const list = family ? RUNNERS.filter(r => r.family === family) : RUNNERS;
  el.innerHTML = list.map(r => `<option value="${r.value}">${shortRunner(r.value)}</option>`).join('');
}

let resumeState = null;

function openModal(resume = null) {
  resumeState = resume;
  const banner = document.getElementById('resume-banner');
  const title  = document.getElementById('modal-title');
  const dirEl  = document.getElementById('f-dir');
  const wtRow  = document.getElementById('worktree-row');
  const wtHint = document.getElementById('worktree-hint');
  const durableRow = document.getElementById('durable-row');
  const durableHint = document.getElementById('durable-hint');
  const subBtn = document.getElementById('submit-btn');

  if (resume) {
    setRunnerOptions(resume.runner?.split('-')[0] ?? null);
    title.textContent   = resume.forkSession ? 'branch session' : 'continue session';
    banner.style.display = '';
    banner.textContent  = `${resume.forkSession ? '⑂ branching from' : '↩ continuing'} · ${resume.sourceId}`;
    document.getElementById('f-runner').value = resume.runner;
    dirEl.value = resume.dir; dirEl.disabled = true;
    wtRow.style.display = 'none'; wtHint.style.display = 'none';
    durableRow.style.display = 'none'; durableHint.style.display = 'none';
    subBtn.textContent = resume.forkSession ? 'queue branch' : 'queue continuation';
  } else {
    setRunnerOptions();
    title.textContent   = 'new task';
    banner.style.display = 'none';
    dirEl.disabled = false; wtRow.style.display = ''; wtHint.style.display = '';
    updateDurableVisibility();
    subBtn.textContent = 'add to queue';
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-task').focus(), 100);
}

function closeModal() {
  resumeState = null;
  document.getElementById('modal-overlay').classList.remove('open');
  setRunnerOptions();
  document.getElementById('f-dir').disabled = false;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function submitTask() {
  const task = document.getElementById('f-task').value.trim();
  const dir  = resumeState ? resumeState.dir : document.getElementById('f-dir').value.trim();
  if (!task) { toast('task required'); return; }
  if (!dir)  { toast('directory required'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'adding…';

  try {
    const body = {
      task, dir,
      runner: document.getElementById('f-runner').value,
      priority: parseInt(document.getElementById('f-priority').value) || 0,
      worktree: resumeState ? false : document.getElementById('f-worktree').checked,
      durableWorktree: resumeState ? false : document.getElementById('f-durable-worktree').checked,
      ...(resumeState ? { resumeSessionId:resumeState.sessionId, forkSession:resumeState.forkSession } : {}),
    };
    const res  = await fetch('/api/tasks', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('f-task').value = '';
    closeModal();
    toast(resumeState ? (resumeState.forkSession ? 'branch queued' : 'continuation queued') : 'task added');
    prevTasksKey = ''; loadAll();
  } catch (err) {
    toast(`error: ${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = resumeState?.forkSession ? 'queue branch' : resumeState ? 'queue continuation' : 'add to queue';
  }
}

// ── Summary ────────────────────────────────────────────────────────────
let sumTask = null;

async function openSum(e, id) {
  e.stopPropagation();
  let task = allTasks.find(t => t.id === id);
  if (!task?.finalMessage) {
    const res = await fetch(`/api/tasks/${id}`);
    task = await res.json(); outputCache[id] = task;
  }
  if (!task?.finalMessage) return;
  sumTask = task;

  document.getElementById('sum-prompt').textContent = task.task;
  document.getElementById('sum-runner').textContent = shortRunner(task.runner);
  const dur = task.started && task.completed
    ? `${Math.round((new Date(task.completed) - new Date(task.started)) / 1000)}s · `
    : '';
  document.getElementById('sum-timing').textContent = dur + (task.completed ? `${timeAgo(task.completed)} ago` : '');
  document.getElementById('sum-body').innerHTML = renderSumMarkdown(task.finalMessage);
  document.getElementById('sum-overlay').classList.add('open');
}

function closeSum() {
  document.getElementById('sum-overlay').classList.remove('open');
  sumTask = null;
}
function closeSumOverlay(e) {
  if (e.target === document.getElementById('sum-overlay')) closeSum();
}

async function copySum() {
  if (!sumTask?.finalMessage) return;
  await navigator.clipboard.writeText(sumTask.finalMessage);
  const btn = document.getElementById('sum-copy');
  btn.textContent = 'copied'; setTimeout(() => { btn.textContent = 'copy'; }, 1500);
}

function renderSumMarkdown(raw) {
  const blocks = [];
  const wp = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, _l, code) => {
    const i = blocks.length;
    blocks.push(`<pre><code>${esc(code)}</code></pre>`);
    return `\x00B${i}\x00`;
  });

  let html = esc(wp)
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/^### ([^\n]+)/gm, '<span class="sh3">$1</span>')
    .replace(/^## ([^\n]+)/gm,  '<span class="sh2">$1</span>')
    .replace(/^# ([^\n]+)/gm,   '<span class="sh1">$1</span>');

  blocks.forEach((b, i) => { html = html.replace(`\x00B${i}\x00`, b); });
  return `<div class="sum-msg">${html}</div>`;
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('sum-overlay').classList.contains('open')) closeSum();
  else if (document.getElementById('modal-overlay').classList.contains('open')) closeModal();
});

// ── Init ───────────────────────────────────────────────────────────────
function updateDurableVisibility() {
  const enabled = appConfig.features?.durableWorktrees === true;
  const checked = document.getElementById('f-worktree').checked;
  document.getElementById('durable-row').style.display = enabled && checked ? '' : 'none';
  document.getElementById('durable-hint').style.display = enabled && checked ? '' : 'none';
  if (!enabled || !checked) document.getElementById('f-durable-worktree').checked = false;
}

document.getElementById('f-worktree').addEventListener('change', updateDurableVisibility);

loadConfig().then(() => { loadDirs(); loadAll(); });
setInterval(loadAll, 6000);
</script>
