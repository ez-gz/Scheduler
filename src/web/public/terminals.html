<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Scheduler — Shell</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#000; --surface:#0d0d0d; --card:#0f0f0f; --border:#1c1c1c; --border2:#262626;
  --text:#ebebeb; --text-2:#787878; --text-3:#3d3d3d; --accent:#30d158; --red:#ff453a; --yellow:#ffd60a;
  --nav-h:52px; --r:6px; --font:'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; line-height:1.5; min-height:100vh; -webkit-text-size-adjust:100%; }
header {
  position:sticky; top:0; z-index:10; background:rgba(0,0,0,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border); padding:max(11px, env(safe-area-inset-top)) 16px 11px; display:flex; align-items:center; gap:10px;
}
header h1 { font-size:13px; font-weight:600; flex:1; }
main { max-width:980px; margin:0 auto; padding:12px 10px calc(var(--nav-h) + 44px + env(safe-area-inset-bottom)); display:grid; grid-template-columns:260px 1fr; gap:10px; }
@media (max-width:760px) { main { grid-template-columns:1fr; } }
.panel { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.panel-h { padding:9px 11px; border-bottom:1px solid var(--border); font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; }
.new { padding:10px; display:flex; flex-direction:column; gap:8px; }
input, textarea {
  width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:4px; color:var(--text);
  font-family:var(--font); font-size:12px; padding:8px 9px; outline:none;
}
input:focus, textarea:focus { border-color:var(--accent); }
button {
  padding:7px 11px; min-height:34px; border:1px solid var(--border2); border-radius:4px; background:var(--surface);
  color:var(--text-2); font-family:var(--font); font-size:11px; cursor:pointer;
}
button.primary { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
button.danger { color:var(--red); border-color:rgba(255,69,58,.35); background:rgba(255,69,58,.04); }
button.warn { color:var(--yellow); border-color:rgba(255,213,10,.35); background:rgba(255,213,10,.04); }
button:disabled { opacity:.35; cursor:default; }
.sessions { display:flex; flex-direction:column; }
.session { padding:10px 11px; border-bottom:1px solid var(--border); cursor:pointer; }
.session.active { background:#111; border-left:2px solid var(--accent); padding-left:9px; }
.sname { font-size:12px; font-weight:650; display:flex; justify-content:space-between; gap:8px; }
.cwd { font-size:10px; color:var(--text-3); margin-top:3px; word-break:break-word; }
.state { color:var(--text-3); font-size:10px; }
.state.on { color:var(--accent); }
.terminal { min-height:58vh; display:flex; flex-direction:column; }
.term-head { padding:8px 10px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; }
.term-title { flex:1; min-width:0; }
.term-name { font-size:12px; font-weight:650; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.term-cwd { color:var(--text-3); font-size:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
pre {
  flex:1; min-height:380px; max-height:65vh; overflow:auto; padding:12px; background:#030303; color:#d6d6d6;
  font-family:var(--font); font-size:12px; line-height:1.45; white-space:pre-wrap; word-break:break-word;
}
.input-row { display:grid; grid-template-columns:1fr auto auto; gap:6px; padding:8px; border-top:1px solid var(--border); }
.key-row {
  display:grid; grid-template-columns:repeat(8, minmax(0, 1fr)); gap:5px;
  padding:8px; border-top:1px solid var(--border); background:#050505;
}
.key-row button { padding:5px 4px; min-height:30px; font-size:10px; }
.hint-line { padding:0 8px 8px; color:var(--text-3); font-size:10px; background:#050505; }
.kill-state { opacity:.45; pointer-events:none; }
.empty { color:var(--text-3); padding:48px 12px; text-align:center; }
.bnav {
  position:fixed; bottom:0; left:0; right:0; z-index:100; background:rgba(0,0,0,0.96); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(5,1fr); height:calc(var(--nav-h) + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom);
}
.nitem { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text-3); text-decoration:none; font-size:8px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; padding:8px 0; }
.nitem.active { color:var(--accent); }
.nicon svg { width:18px; height:18px; }
#toast { position:fixed; left:50%; bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border2); color:var(--text); font-size:11px; padding:8px 12px; border-radius:5px; opacity:0; pointer-events:none; transition:.18s; z-index:200; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header><h1>Shell</h1><button onclick="load()">refresh</button></header>
<main>
  <section class="panel">
    <div class="panel-h">New tmux session</div>
    <div class="new">
      <input id="name" placeholder="name">
      <input list="dir-list" id="cwd" placeholder="/Users/you/project">
      <datalist id="dir-list"></datalist>
      <button class="primary" onclick="createTerminal()">create</button>
    </div>
    <div class="panel-h">Sessions</div>
    <div class="sessions" id="sessions"></div>
  </section>
  <section class="panel terminal" id="terminal">
    <div class="empty">select or create a session</div>
  </section>
</main>

<nav class="bnav">
  <a href="/" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="17" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg></span><span>Queue</span></a>
  <a href="/projects.html" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 5h6l2 2h8v12H4z"/><path d="M4 10h16"/></svg></span><span>Projects</span></a>
  <a href="/terminals.html" class="nitem active"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m5 7 5 5-5 5"/><path d="M12 19h7"/></svg></span><span>Shell</span></a>
  <a href="/admin.html" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg></span><span>Admin</span></a>
  <a href="/settings.html" class="nitem"><span class="nicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg></span><span>Settings</span></a>
</nav>
<div id="toast"></div>

<script>
let terminals = [];
let selected = null;
let source = null;
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}
function ansiHtml(raw) {
  const fg = {30:'#2f343f',31:'#ff5f57',32:'#30d158',33:'#ffd60a',34:'#0a84ff',35:'#bf5af2',36:'#64d2ff',37:'#ebebeb',90:'#6b7280',91:'#ff7b72',92:'#63e68c',93:'#ffe66d',94:'#5eb1ff',95:'#d999ff',96:'#8ee7ff',97:'#fff'};
  const bg = {40:'#000',41:'#5a1616',42:'#123d21',43:'#4a3b00',44:'#062c5f',45:'#32144a',46:'#064354',47:'#e5e7eb',100:'#1f2937',101:'#7f1d1d',102:'#14532d',103:'#713f12',104:'#1e3a8a',105:'#581c87',106:'#155e75',107:'#f9fafb'};
  let state = {};
  let html = '';
  let last = 0;
  const cleaned = String(raw ?? '').replace(/\x1b\][^\x07]*(\x07|\x1b\\)/g, '');
  const re = /\x1b\[([0-9;?]*)?([A-Za-z])/g;

  function style() {
    const s = [];
    if (state.fg) s.push(`color:${state.fg}`);
    if (state.bg) s.push(`background:${state.bg}`);
    if (state.bold) s.push('font-weight:700');
    if (state.dim) s.push('opacity:.72');
    if (state.underline) s.push('text-decoration:underline');
    return s.length ? ` style="${s.join(';')}"` : '';
  }
  function emit(text) {
    if (!text) return;
    html += `<span${style()}>${esc(text)}</span>`;
  }
  function xterm256(n) {
    const base = ['#000000','#800000','#008000','#808000','#000080','#800080','#008080','#c0c0c0','#808080','#ff0000','#00ff00','#ffff00','#0000ff','#ff00ff','#00ffff','#ffffff'];
    if (n < 16) return base[n] ?? null;
    if (n >= 16 && n <= 231) {
      const v = [0, 95, 135, 175, 215, 255];
      const i = n - 16;
      return `rgb(${v[Math.floor(i / 36)]},${v[Math.floor(i / 6) % 6]},${v[i % 6]})`;
    }
    if (n >= 232 && n <= 255) {
      const c = 8 + (n - 232) * 10;
      return `rgb(${c},${c},${c})`;
    }
    return null;
  }

  for (const m of cleaned.matchAll(re)) {
    emit(cleaned.slice(last, m.index));
    last = m.index + m[0].length;
    if (m[2] !== 'm') continue;
    const codes = (m[1] || '0').split(';').filter(Boolean).map(Number);
    if (!codes.length) codes.push(0);
    for (let i = 0; i < codes.length; i++) {
      const c = codes[i];
      if (c === 0) state = {};
      else if (c === 1) state.bold = true;
      else if (c === 2) state.dim = true;
      else if (c === 4) state.underline = true;
      else if (c === 22) { state.bold = false; state.dim = false; }
      else if (c === 24) state.underline = false;
      else if (c === 39) delete state.fg;
      else if (c === 49) delete state.bg;
      else if (fg[c]) state.fg = fg[c];
      else if (bg[c]) state.bg = bg[c];
      else if (c === 38 && codes[i + 1] === 5) { state.fg = xterm256(codes[i + 2]); i += 2; }
      else if (c === 48 && codes[i + 1] === 5) { state.bg = xterm256(codes[i + 2]); i += 2; }
      else if (c === 38 && codes[i + 1] === 2) { state.fg = `rgb(${codes[i+2]||0},${codes[i+3]||0},${codes[i+4]||0})`; i += 4; }
      else if (c === 48 && codes[i + 1] === 2) { state.bg = `rgb(${codes[i+2]||0},${codes[i+3]||0},${codes[i+4]||0})`; i += 4; }
    }
  }
  emit(cleaned.slice(last));
  return html;
}
async function loadDirs() {
  const res = await fetch('/api/dirs');
  const dirs = await res.json();
  document.getElementById('dir-list').innerHTML = dirs.map(d => `<option value="${esc(d)}">`).join('');
  if (!document.getElementById('cwd').value && dirs[0]) document.getElementById('cwd').value = dirs[0];
}
async function load() {
  const res = await fetch('/api/terminals');
  terminals = await res.json();
  document.getElementById('sessions').innerHTML = terminals.length
    ? terminals.map(t => `<div class="session ${selected===t.id?'active':''}" onclick="selectTerminal('${t.id}')"><div class="sname"><span>${esc(t.name)}</span><span class="state ${t.alive?'on':''}">${t.alive?'live':'dead'}</span></div><div class="cwd">${esc(t.cwd)}</div></div>`).join('')
    : '<div class="empty" style="padding:24px 10px">no sessions</div>';
}
async function createTerminal() {
  const name = document.getElementById('name').value.trim();
  const cwd = document.getElementById('cwd').value.trim();
  const res = await fetch('/api/terminals', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,cwd})});
  const data = await res.json();
  if (!res.ok) { toast(data.error ?? 'error'); return; }
  document.getElementById('name').value = '';
  await load();
  selectTerminal(data.terminal.id);
}
function renderTerminal(t) {
  document.getElementById('terminal').innerHTML = `
    <div class="term-head">
      <div class="term-title"><div class="term-name">${esc(t.name)}</div><div class="term-cwd">${esc(t.cwd)}</div></div>
      <button class="warn" onclick="ctrlC()">ctrl-c</button>
      <button class="danger" id="kill-btn" onclick="killTerminal()">kill</button>
    </div>
    <pre id="output"></pre>
    <div class="key-row">
      <button onclick="sendKey('up')">up</button>
      <button onclick="sendKey('down')">down</button>
      <button onclick="sendKey('left')">left</button>
      <button onclick="sendKey('right')">right</button>
      <button onclick="sendKey('tab')">tab</button>
      <button onclick="sendKey('esc')">esc</button>
      <button onclick="sendKey('clear')">clear</button>
      <button onclick="sendKey('ctrl-r')">ctrl-r</button>
    </div>
    <div class="input-row">
      <input id="input" placeholder="command or :up, :tab, :esc, :ctrl-r" onkeydown="handleInputKey(event)">
      <button onclick="sendInput()">send</button>
      <button onclick="sendInput(false)">type</button>
    </div>
    <div class="hint-line">colon keys: :up :down :left :right :tab :esc :enter :clear :ctrl-c :ctrl-r</div>`;
}
function selectTerminal(id) {
  selected = id;
  const t = terminals.find(x => x.id === id);
  if (!t) return;
  renderTerminal(t);
  load();
  if (source) source.close();
  source = new EventSource(`/api/terminals/${id}/stream`);
  source.onmessage = e => {
    const data = JSON.parse(e.data);
    const out = document.getElementById('output');
    if (!out) return;
    const atBottom = out.scrollHeight - out.scrollTop - out.clientHeight < 80;
    out.innerHTML = data.error ? esc(data.error) : ansiHtml(data.output);
    if (atBottom) out.scrollTop = out.scrollHeight;
  };
}
function handleInputKey(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    sendInput();
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    sendKey('up');
  } else if (event.key === 'ArrowDown') {
    event.preventDefault();
    sendKey('down');
  } else if (event.key === 'Tab') {
    event.preventDefault();
    sendKey('tab');
  } else if (event.key === 'Escape') {
    event.preventDefault();
    sendKey('esc');
  }
}
function colonKey(input) {
  const key = input.trim().toLowerCase();
  return key.startsWith(':') ? key.slice(1) : null;
}
async function sendInput(enter = true) {
  if (!selected) return;
  const el = document.getElementById('input');
  const input = el.value;
  if (!input && enter === false) return;
  const key = colonKey(input);
  if (key) {
    const ok = await sendKey(key);
    if (ok) el.value = '';
    return;
  }
  const res = await fetch(`/api/terminals/${selected}/input`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input,enter})});
  if (res.ok) el.value = '';
  else toast((await res.json()).error ?? 'error');
}
async function sendKey(key) {
  if (!selected) return false;
  const res = await fetch(`/api/terminals/${selected}/keys`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});
  if (!res.ok) {
    toast((await res.json()).error ?? `bad key: ${key}`);
    return false;
  }
  return true;
}
async function ctrlC() {
  if (!selected) return;
  await sendKey('ctrl-c');
}
async function killTerminal() {
  if (!selected) return;
  const id = selected;
  const btn = document.getElementById('kill-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'killing'; }
  const res = await fetch(`/api/terminals/${id}/kill`, {method:'POST'});
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.terminal?.alive) {
    toast(data.error ?? 'kill failed');
    if (btn) { btn.disabled = false; btn.textContent = 'kill'; }
    return;
  }
  if (source) source.close();
  source = null; selected = null;
  document.getElementById('terminal').innerHTML = '<div class="empty">select or create a session</div>';
  toast('killed');
  load();
}
loadDirs(); load();
setInterval(load, 7000);
</script>
</body>
</html>
